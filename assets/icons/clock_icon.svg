<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="256" fill="#FC5575"/>

  <!-- Bottom shadow -->
  <path d="M0 256C0 397.38 114.62 512 256 512C397.38 512 512 397.38 512 256H0Z"
        fill="#E64564"/>

  <!-- Clock face -->
  <circle cx="256" cy="256" r="213" fill="#E6E9EE"/>
  <circle cx="256" cy="256" r="213" fill="#CCD5E0" opacity="0.4"/>

  <!-- Hour markers -->
  <rect x="247" y="61" width="18" height="40" rx="9" fill="#40596B"/>
  <rect x="247" y="411" width="18" height="40" rx="9" fill="#40596B"/>

  <rect x="61" y="247" width="40" height="18" rx="9" fill="#40596B"/>
  <rect x="379" y="247" width="40" height="18" rx="9" fill="#40596B"/>

  <!-- Hour hand -->
  <g transform="rotate(-47 256 256)">
    <rect x="243" y="120" width="26" height="160" rx="13" fill="#40596B"/>
  </g>

  <!-- Minute hand -->
  <g transform="rotate(45 256 256)">
    <rect x="243" y="150" width="26" height="120" rx="13" fill="#334A5E"/>
  </g>

  <!-- Second hand -->
  <g transform="rotate(130 256 256)">
